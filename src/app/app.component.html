<!-- Barra de navegación -->
<div class="header">
  <h1 class="title">Gestión de Empleados</h1>
</div>

<!-- Contenedor principal -->
<div class="container">
  <!-- Formulario para agregar empleados -->
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>Agregar Empleado</mat-card-title>
      <mat-card-subtitle>Ingresa los datos del empleado</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="agregarEmpleado()">
        <mat-form-field appearance="fill">
            <mat-label>Nombre</mat-label>
            <input matInput [(ngModel)]="empleado.nombre" name="nombre" placeholder="Nombre" required>
        </mat-form-field>

        <mat-form-field appearance="fill">
            <mat-label>Puesto</mat-label>
            <input matInput [(ngModel)]="empleado.puesto" name="puesto" placeholder="Puesto" required>
        </mat-form-field>

        <mat-form-field appearance="fill">
            <mat-label>Salario</mat-label>
            <input matInput [(ngModel)]="empleado.salario" name="salario" placeholder="Salario" required>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit">Agregar</button>
      </form>
    </mat-card-content>
  </mat-card>

<!-- Lista de empleados -->
<mat-card class="list-card">
  <mat-card-header>
      <mat-card-title>Lista de Empleados</mat-card-title>
      <mat-card-subtitle>Empleados registrados</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="empleados" class="mat-elevation-z8">
      <!-- Columna Nombre -->
      <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let empleado">{{ empleado.nombre }}</td>
      </ng-container>

      <!-- Columna Puesto -->
      <ng-container matColumnDef="puesto">
          <th mat-header-cell *matHeaderCellDef>Puesto</th>
          <td mat-cell *matCellDef="let empleado">{{ empleado.puesto }}</td>
      </ng-container>

      <!-- Columna Salario -->
      <ng-container matColumnDef="salario">
          <th mat-header-cell *matHeaderCellDef>Salario</th>
          <td mat-cell *matCellDef="let empleado">{{ empleado.salario }}</td>
      </ng-container>

      <!-- Columna Acciones -->
      <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let empleado">
            <button mat-icon-button color="warn" (click)="eliminarEmpleado(empleado.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
      </ng-container>

      <!-- Filas -->
      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
    </table>
  </mat-card-content>
  </mat-card>
</div>
